services:
    php:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: log-service-php
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - ./:/var/www
        environment:
            - PHP_IDE_CONFIG=serverName=log-service
            - APP_ENV=${APP_ENV:-dev}  # dev по умолчанию
            - APP_DEBUG=${APP_DEBUG:-1}
            - RABBITMQ_DSN=${RABBITMQ_DSN}
        extra_hosts:
            - host.docker.internal:host-gateway
        networks:
            - log-network

    nginx:
        image: nginx:alpine
        container_name: log-service-nginx
        restart: unless-stopped
        ports:
            - "8080:80"
        volumes:
            - ./:/var/www
            - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
        networks:
            - log-network
        depends_on:
            - php

    rabbitmq:
        image: rabbitmq:3.13-management-alpine
        container_name: log-service-rabbitmq
        restart: unless-stopped
        ports:
            - "5672:5672"
            - "15672:15672"
        environment:
            RABBITMQ_DEFAULT_USER: "${RABBITMQ_LOGIN}"
            RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASSWORD}"
        volumes:
            - rabbitmq_data:/var/lib/rabbitmq
        networks:
            - log-network

volumes:
    rabbitmq_data:

networks:
    log-network:
        driver: bridge
