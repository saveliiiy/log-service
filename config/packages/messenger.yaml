framework:
    messenger:
        transports:
            logs_ingest:
                dsn: '%env(RABBITMQ_DSN)%'
                options:
                    exchange:
                        name: logs
                        type: direct
                    queues:
                        logs.ingest:
                            arguments:
                                x-max-priority: 10
        routing:
            'App\Message\LogMessage': logs_ingest
